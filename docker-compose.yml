# =============================================================================
# SAUDAPAKKA — PRODUCTION DOCKER COMPOSE
# Usage: docker compose up -d
# Requires: .env file (copy from .env.production.template and fill in values)
# =============================================================================

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: saudapakka_stable_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - saudapakka_postgres_data:/var/lib/postgresql/data # ✅ DB SAFE
    # ⚠️  No ports exposed — DB only accessible within Docker network
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./saudapakka_backend
    container_name: saudapakka_backend
    restart: unless-stopped
    # ⚠️  No ports exposed — backend only accessible via Nginx
    volumes:
      - ./saudapakka_backend/media:/app/media # ✅ Host media sync
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      - POSTGRES_HOST=saudapakka_stable_postgres
      - POSTGRES_PORT=5432
    working_dir: /app

  frontend:
    build:
      context: ./saudapakka_frontend
      dockerfile: Dockerfile
      args:
        - NEXT_PUBLIC_API_URL=${NEXT_PUBLIC_API_URL}
        - NEXT_PUBLIC_GOOGLE_MAPS_API_KEY=${NEXT_PUBLIC_GOOGLE_MAPS_API_KEY}
    container_name: saudapakka_frontend
    restart: unless-stopped
    # ⚠️  No ports exposed — frontend only accessible via Nginx
    env_file:
      - .env
    depends_on:
      - backend

  nginx:
    image: nginx:alpine
    container_name: saudapakka_nginx
    restart: unless-stopped
    ports:
      - "80:80"   # HTTP → redirects to HTTPS
      - "443:443" # HTTPS
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot
      - ./saudapakka_backend/media:/app/media # ✅ Nginx serves media files
    depends_on:
      - backend
      - frontend

  certbot:
    image: certbot/certbot
    container_name: saudapakka_certbot
    volumes:
      - ./certbot/conf:/etc/letsencrypt
      - ./certbot/www:/var/www/certbot

volumes:
  saudapakka_postgres_data: # ✅ Database persisted forever
